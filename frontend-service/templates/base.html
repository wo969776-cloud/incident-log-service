<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Incident Platform</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
<div class="container-fluid">
<a class="navbar-brand" href="/ui/home">Incident Platform</a>

<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/ui/public-board">Board</a></li>
<li class="nav-item"><a class="nav-link" href="/ui/incidents">Incidents</a></li>
<li class="nav-item"><a class="nav-link" href="/ui/profile">Profile</a></li>
<li class="nav-item"><a class="nav-link text-danger" href="/ui/logout">Logout</a></li>
</ul>

</div>
</nav>

<div class="container mt-4">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}
<div class="alert alert-{{ 'danger' if category=='error' else category }}">
{{ message }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

{% block content %}{% endblock %}

</div>

</body>
</html>
