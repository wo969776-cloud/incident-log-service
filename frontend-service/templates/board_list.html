{% extends "base.html" %}

{% block content %}

<h3>Public Board</h3>

<a href="/ui/public-board/new" class="btn btn-primary mb-3">New Post</a>

<table class="table table-striped">

<tr>
<th>ID</th>
<th>Title</th>
<th>Author</th>
</tr>

{% for post in posts %}
<tr>
<td>{{ post.id }}</td>
<td><a href="/ui/public-board/{{ post.id }}">{{ post.title }}</a></td>
<td>{{ post.user_id }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
