{% extends "base.html" %}

{% block content %}

<h3>{{ post.title }}</h3>

<p>{{ post.content }}</p>

{% if can_edit %}

<a href="/ui/public-board/{{ post.id }}/edit" class="btn btn-warning">Edit</a>

<form method="post" action="/ui/public-board/{{ post.id }}/delete" style="display:inline;">
<button class="btn btn-danger">Delete</button>
</form>

{% endif %}

{% endblock %}
