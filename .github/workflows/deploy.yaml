name: MSA Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: wo9697
  NAMESPACE: incident

jobs:

# -------------------------------------------------
# AUTH SERVICE
# -------------------------------------------------
  build-auth:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            wo9697/auth-service:latest
            wo9697/auth-service:${{ github.sha }}

      - name: Deploy
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          kubectl set image deployment/auth-service auth-service=wo9697/auth-service:${{ github.sha }} -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/auth-service -n ${{ env.NAMESPACE }}

