# ============================================================
# ConfigMap: 서비스 간 URL 및 공통 설정
# 실제 운영 시 Secret은 반드시 K8s Secret 또는 Vault로 분리하세요.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: msa-config
  namespace: incident
data:
  AUTH_SERVICE_URL:     "http://auth-service:8001"
  INCIDENT_SERVICE_URL: "http://incident-service:8002"
  BOARD_SERVICE_URL:    "http://board-service:8003"
  FRONTEND_SERVICE_URL: "http://frontend-service:8004"
  JWT_EXP_HOURS:        "24"

---
# ============================================================
# Secret: 민감 정보 (base64 인코딩 필요 - 아래는 예시값)
# 실제 배포 전: echo -n "your_secret" | base64 로 인코딩
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: msa-secret
  namespace: incident
type: Opaque
stringData:                        # stringData 사용 시 base64 불필요
  JWT_SECRET: "jwt_prod_secret_change_me_min_32chars"
  SECRET_KEY: "flask_prod_secret_change_me"

  # 서비스별 DB URL (MariaDB)
  AUTH_DATABASE_URL:     "mysql+pymysql://root:password@mariadb-auth:3306/auth_db"
  INCIDENT_DATABASE_URL: "mysql+pymysql://root:password@mariadb-incident:3306/incident_db"
  BOARD_DATABASE_URL:    "mysql+pymysql://root:password@mariadb-board:3306/board_db"
