apiVersion: v1
kind: Service
metadata:
  name: mariadb-incident
  namespace: incident
spec:
  clusterIP: None
  selector:
    app: mariadb-incident
  ports:
  - port: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-incident
  namespace: incident
spec:
  serviceName: mariadb-incident
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-incident
  template:
    metadata:
      labels:
        app: mariadb-incident
    spec:
      nodeSelector:
        kubernetes.io/hostname: node3.labs.local

      tolerations:
      - key: "db"
        operator: "Equal"
        value: "only"
        effect: "NoSchedule"

      containers:
      - name: mariadb
        image: mariadb:10.6
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: password
        - name: MYSQL_DATABASE
          value: incident_db
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql

  volumeClaimTemplates:
  - metadata:
      name: mariadb-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 5Gi
