apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: incident
  labels:
    app: incident-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-service
  template:
    metadata:
      labels:
        app: incident-service
    spec:
      containers:
        - name: incident-service
          image: wo9697/incident-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: msa-secret
                  key: INCIDENT_DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: incident-service
  namespace: incident
spec:
  selector:
    app: incident-service
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
