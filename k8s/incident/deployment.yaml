apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-service
  namespace: incident
spec:
  replicas: 2
  selector:
    matchLabels:
      app: incident-service
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: incident-service
    spec:
      containers:
      - name: incident
        image: wo9697/incident-service:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8002
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
