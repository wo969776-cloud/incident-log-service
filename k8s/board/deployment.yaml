apiVersion: apps/v1
kind: Deployment
metadata:
  name: board-service
  namespace: incident
  labels:
    app: board-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: board-service
  template:
    metadata:
      labels:
        app: board-service
    spec:
      containers:
        - name: board-service
          image: wo9697/board-service:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: msa-secret
                  key: BOARD_DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: board-service
  namespace: incident
spec:
  selector:
    app: board-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
