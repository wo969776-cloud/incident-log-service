apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: incident
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: wo9697/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: msa-secret
                  key: JWT_SECRET
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: msa-config
                  key: AUTH_SERVICE_URL
            - name: INCIDENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: msa-config
                  key: INCIDENT_SERVICE_URL
            - name: BOARD_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: msa-config
                  key: BOARD_SERVICE_URL
            - name: FRONTEND_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: msa-config
                  key: FRONTEND_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: incident
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
# ============================================================
# Ingress: 외부 트래픽 → api-gateway
# Nginx Ingress Controller가 설치되어 있어야 합니다.
# kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/baremetal/deploy.yaml
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: incident-ingress
  namespace: incident
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: incident.yourdomain.com       # 실제 도메인으로 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
  # TLS 설정 (cert-manager 사용 시)
  # tls:
  #   - hosts:
  #       - incident.yourdomain.com
  #     secretName: incident-tls
