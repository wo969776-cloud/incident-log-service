apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: incident
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth
        image: wo9697/auth-service:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: msa-secret
              key: AUTH_DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: msa-secret
              key: JWT_SECRET
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
